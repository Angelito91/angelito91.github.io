<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background square with slight rotation -->
  <rect x="2" y="2" width="28" height="28" rx="6" fill="#0e0f14" stroke="url(#border-grad)" stroke-width="1.5"/>

  <!-- Inner subtle fill -->
  <rect x="4" y="4" width="24" height="24" rx="4.5" fill="rgba(124,77,255,0.08)"/>

  <!-- Letter A -->
  <text x="16" y="22.5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="18" fill="url(#text-grad)">A</text>

  <!-- Accent dot (mint/teal) -->
  <circle cx="26" cy="5" r="2.5" fill="#2dd4a8" opacity="0.85"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="border-grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(124,77,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(124,77,255,0.15)"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="8" y1="6" x2="24" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c4dff"/>
      <stop offset="50%" stop-color="#b050cc"/>
      <stop offset="100%" stop-color="#e0507a"/>
    </linearGradient>
  </defs>
</svg>
