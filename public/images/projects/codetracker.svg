<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e0f14"/>
      <stop offset="100%" stop-color="#121320"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chartLine" x1="160" y1="240" x2="640" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2dd4a8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="400" y1="100" x2="400" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="799" height="449" rx="11.5" fill="none" stroke="#1e1f2e" stroke-opacity="0.6"/>

  <!-- Ambient glow -->
  <ellipse cx="400" cy="180" rx="320" ry="200" fill="url(#glow)"/>

  <!-- Grid lines -->
  <line x1="64" y1="0" x2="64" y2="450" stroke="#1e1f2e" stroke-opacity="0.3"/>
  <line x1="736" y1="0" x2="736" y2="450" stroke="#1e1f2e" stroke-opacity="0.2"/>
  <line x1="0" y1="180" x2="800" y2="180" stroke="#1e1f2e" stroke-opacity="0.15"/>

  <!-- Chart area: horizontal guide lines -->
  <line x1="160" y1="120" x2="640" y2="120" stroke="#1e1f2e" stroke-opacity="0.25" stroke-dasharray="4 4"/>
  <line x1="160" y1="160" x2="640" y2="160" stroke="#1e1f2e" stroke-opacity="0.2" stroke-dasharray="4 4"/>
  <line x1="160" y1="200" x2="640" y2="200" stroke="#1e1f2e" stroke-opacity="0.2" stroke-dasharray="4 4"/>
  <line x1="160" y1="240" x2="640" y2="240" stroke="#1e1f2e" stroke-opacity="0.25" stroke-dasharray="4 4"/>

  <!-- Chart line (performance trend) -->
  <path d="M 160 230 C 220 225, 260 210, 300 190 S 370 155, 400 150 S 460 165, 500 140 S 560 110, 600 105 L 640 95" fill="none" stroke="url(#chartLine)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Chart area fill -->
  <path d="M 160 230 C 220 225, 260 210, 300 190 S 370 155, 400 150 S 460 165, 500 140 S 560 110, 600 105 L 640 95 L 640 260 L 160 260 Z" fill="url(#chartFill)"/>

  <!-- Data points -->
  <circle cx="160" cy="230" r="4" fill="#0e0f14" stroke="#2dd4a8" stroke-width="2"/>
  <circle cx="300" cy="190" r="4" fill="#0e0f14" stroke="#2dd4a8" stroke-width="2"/>
  <circle cx="400" cy="150" r="4" fill="#0e0f14" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="500" cy="140" r="4" fill="#0e0f14" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="600" cy="105" r="4" fill="#0e0f14" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="640" cy="95" r="5" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="640" cy="95" r="2" fill="#3b82f6"/>

  <!-- Y-axis labels -->
  <text x="148" y="124" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#7a7a8e" fill-opacity="0.5">2000</text>
  <text x="148" y="164" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#7a7a8e" fill-opacity="0.5">1500</text>
  <text x="148" y="204" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#7a7a8e" fill-opacity="0.5">1000</text>
  <text x="148" y="244" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#7a7a8e" fill-opacity="0.5">500</text>

  <!-- Mini bar chart (secondary) -->
  <rect x="180" y="218" width="16" height="22" rx="2" fill="#2dd4a8" fill-opacity="0.15"/>
  <rect x="204" y="208" width="16" height="32" rx="2" fill="#2dd4a8" fill-opacity="0.2"/>
  <rect x="228" y="198" width="16" height="42" rx="2" fill="#3b82f6" fill-opacity="0.2"/>
  <rect x="252" y="212" width="16" height="28" rx="2" fill="#3b82f6" fill-opacity="0.15"/>

  <!-- Project title -->
  <text x="400" y="310" text-anchor="middle" font-family="'Syne', 'Inter', system-ui, sans-serif" font-size="24" font-weight="700" fill="#ece8e1" letter-spacing="-0.02em">CodeTracker</text>

  <!-- Tech stack -->
  <text x="400" y="340" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#7a7a8e" fill-opacity="0.7" letter-spacing="0.04em">React · Node.js · PostgreSQL · D3.js</text>

  <!-- Decorative dots -->
  <circle cx="352" cy="370" r="2.5" fill="#3b82f6" opacity="0.45"/>
  <circle cx="368" cy="370" r="2.5" fill="#3b82f6" opacity="0.28"/>
  <circle cx="384" cy="370" r="2.5" fill="#3b82f6" opacity="0.14"/>

  <!-- Bottom accent line -->
  <line x1="320" y1="390" x2="480" y2="390" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Corner accents -->
  <line x1="24" y1="24" x2="48" y2="24" stroke="#1e1f2e" stroke-opacity="0.5"/>
  <line x1="24" y1="24" x2="24" y2="48" stroke="#1e1f2e" stroke-opacity="0.5"/>
  <line x1="776" y1="426" x2="752" y2="426" stroke="#1e1f2e" stroke-opacity="0.5"/>
  <line x1="776" y1="426" x2="776" y2="402" stroke="#1e1f2e" stroke-opacity="0.5"/>
</svg>
