<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e0f14"/>
      <stop offset="100%" stop-color="#121320"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="799" height="449" rx="11.5" fill="none" stroke="#1e1f2e" stroke-opacity="0.6"/>

  <!-- Ambient glow -->
  <ellipse cx="400" cy="180" rx="320" ry="200" fill="url(#glow)"/>

  <!-- Grid lines -->
  <line x1="64" y1="0" x2="64" y2="450" stroke="#1e1f2e" stroke-opacity="0.3"/>
  <line x1="736" y1="0" x2="736" y2="450" stroke="#1e1f2e" stroke-opacity="0.2"/>
  <line x1="0" y1="180" x2="800" y2="180" stroke="#1e1f2e" stroke-opacity="0.15"/>

  <!-- Engine icon: nested triangles -->
  <g transform="translate(400, 165)">
    <polygon points="0,-60 52,30 -52,30" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.4"/>
    <polygon points="0,-36 31,18 -31,18" fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.6"/>
    <polygon points="0,-14 12,7 -12,7" fill="#8b5cf6" fill-opacity="0.2"/>
    <circle cx="0" cy="0" r="3" fill="#8b5cf6" opacity="0.8"/>
  </g>

  <!-- Gear teeth accents -->
  <g transform="translate(400, 165)" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.2">
    <line x1="0" y1="-70" x2="0" y2="-64"/>
    <line x1="60" y1="35" x2="55" y2="32"/>
    <line x1="-60" y1="35" x2="-55" y2="32"/>
    <line x1="35" y1="-52" x2="32" y2="-47"/>
    <line x1="-35" y1="-52" x2="-32" y2="-47"/>
    <line x1="58" y1="-15" x2="53" y2="-13"/>
    <line x1="-58" y1="-15" x2="-53" y2="-13"/>
  </g>

  <!-- Project title -->
  <text x="400" y="290" text-anchor="middle" font-family="'Syne', 'Inter', system-ui, sans-serif" font-size="24" font-weight="700" fill="#ece8e1" letter-spacing="-0.02em">GameForge Engine</text>

  <!-- Tech stack -->
  <text x="400" y="320" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#7a7a8e" fill-opacity="0.7" letter-spacing="0.04em">C++ · OpenGL · ImGui · CMake</text>

  <!-- Decorative dots -->
  <circle cx="352" cy="350" r="2.5" fill="#8b5cf6" opacity="0.45"/>
  <circle cx="368" cy="350" r="2.5" fill="#8b5cf6" opacity="0.28"/>
  <circle cx="384" cy="350" r="2.5" fill="#8b5cf6" opacity="0.14"/>

  <!-- Bottom accent line -->
  <line x1="320" y1="370" x2="480" y2="370" stroke="#8b5cf6" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Corner accents -->
  <line x1="24" y1="24" x2="48" y2="24" stroke="#1e1f2e" stroke-opacity="0.5"/>
  <line x1="24" y1="24" x2="24" y2="48" stroke="#1e1f2e" stroke-opacity="0.5"/>
  <line x1="776" y1="426" x2="752" y2="426" stroke="#1e1f2e" stroke-opacity="0.5"/>
  <line x1="776" y1="426" x2="776" y2="402" stroke="#1e1f2e" stroke-opacity="0.5"/>
</svg>
