<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e0f14"/>
      <stop offset="100%" stop-color="#121320"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barAccent" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="barActive" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#d946a8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f59e42" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="barSorted" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2dd4a8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2dd4a8" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="799" height="449" rx="11.5" fill="none" stroke="#1e1f2e" stroke-opacity="0.6"/>

  <!-- Ambient glow -->
  <ellipse cx="400" cy="160" rx="320" ry="200" fill="url(#glow)"/>

  <!-- Grid lines -->
  <line x1="64" y1="0" x2="64" y2="450" stroke="#1e1f2e" stroke-opacity="0.3"/>
  <line x1="736" y1="0" x2="736" y2="450" stroke="#1e1f2e" stroke-opacity="0.2"/>
  <line x1="0" y1="180" x2="800" y2="180" stroke="#1e1f2e" stroke-opacity="0.15"/>

  <!-- Sorting visualization bars (mid-sort state) -->
  <!-- Baseline at y=240 -->
  <!-- Sorted bars (left side, green) -->
  <rect x="200" y="210" width="22" height="30" rx="3" fill="url(#barSorted)"/>
  <rect x="230" y="195" width="22" height="45" rx="3" fill="url(#barSorted)"/>
  <rect x="260" y="180" width="22" height="60" rx="3" fill="url(#barSorted)"/>

  <!-- Active/comparing bars (orange/pink) -->
  <rect x="290" y="120" width="22" height="120" rx="3" fill="url(#barActive)"/>
  <rect x="290" y="112" width="22" height="4" rx="2" fill="#f59e42" fill-opacity="0.5"/>
  <rect x="320" y="155" width="22" height="85" rx="3" fill="url(#barActive)"/>
  <rect x="320" y="147" width="22" height="4" rx="2" fill="#f59e42" fill-opacity="0.5"/>

  <!-- Swap arrow between active bars -->
  <g transform="translate(327, 105)">
    <path d="M-20,0 C-10,-12 10,-12 20,0" fill="none" stroke="#f59e42" stroke-width="1.2" stroke-opacity="0.6" stroke-linecap="round"/>
    <polygon points="18,-4 22,2 16,2" fill="#f59e42" fill-opacity="0.6"/>
    <polygon points="-18,-4 -22,2 -16,2" fill="#f59e42" fill-opacity="0.6"/>
  </g>

  <!-- Unsorted bars (right side, blue/purple) -->
  <rect x="350" y="100" width="22" height="140" rx="3" fill="url(#barAccent)"/>
  <rect x="380" y="170" width="22" height="70" rx="3" fill="url(#barAccent)"/>
  <rect x="410" y="85" width="22" height="155" rx="3" fill="url(#barAccent)"/>
  <rect x="440" y="140" width="22" height="100" rx="3" fill="url(#barAccent)"/>
  <rect x="470" y="190" width="22" height="50" rx="3" fill="url(#barAccent)"/>
  <rect x="500" y="110" width="22" height="130" rx="3" fill="url(#barAccent)"/>
  <rect x="530" y="160" width="22" height="80" rx="3" fill="url(#barAccent)"/>
  <rect x="560" y="75" width="22" height="165" rx="3" fill="url(#barAccent)"/>

  <!-- Baseline -->
  <line x1="190" y1="240" x2="592" y2="240" stroke="#1e1f2e" stroke-opacity="0.5" stroke-width="1"/>

  <!-- Graph network visualization (top-right, small) -->
  <g transform="translate(640, 100)">
    <!-- Edges -->
    <line x1="0" y1="0" x2="40" y2="30" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.25"/>
    <line x1="40" y1="30" x2="80" y2="10" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.25"/>
    <line x1="0" y1="0" x2="20" y2="50" stroke="#2dd4a8" stroke-width="1" stroke-opacity="0.2"/>
    <line x1="20" y1="50" x2="60" y2="60" stroke="#2dd4a8" stroke-width="1" stroke-opacity="0.2"/>
    <line x1="40" y1="30" x2="60" y2="60" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.2"/>
    <line x1="80" y1="10" x2="60" y2="60" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.2"/>
    <!-- Nodes -->
    <circle cx="0" cy="0" r="5" fill="#0e0f14" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="40" cy="30" r="5" fill="#0e0f14" stroke="#2dd4a8" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="80" cy="10" r="5" fill="#0e0f14" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="20" cy="50" r="5" fill="#0e0f14" stroke="#2dd4a8" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="60" cy="60" r="5" fill="#0e0f14" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Active traversal highlight -->
    <circle cx="40" cy="30" r="8" fill="none" stroke="#2dd4a8" stroke-width="0.8" stroke-opacity="0.3"/>
  </g>

  <!-- Legend pills (top-left area) -->
  <g transform="translate(140, 80)">
    <rect x="0" y="0" width="8" height="8" rx="2" fill="#2dd4a8" fill-opacity="0.7"/>
    <text x="14" y="8" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7a7a8e" fill-opacity="0.6">Sorted</text>
    <rect x="60" y="0" width="8" height="8" rx="2" fill="#f59e42" fill-opacity="0.7"/>
    <text x="74" y="8" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7a7a8e" fill-opacity="0.6">Comparing</text>
    <rect x="145" y="0" width="8" height="8" rx="2" fill="#8b5cf6" fill-opacity="0.7"/>
    <text x="159" y="8" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7a7a8e" fill-opacity="0.6">Unsorted</text>
  </g>

  <!-- Step counter badge -->
  <g transform="translate(140, 250)">
    <rect x="0" y="0" width="72" height="22" rx="6" fill="#161722" stroke="#1e1f2e" stroke-opacity="0.5"/>
    <text x="36" y="15" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7a7a8e" fill-opacity="0.6">Step 24/56</text>
  </g>

  <!-- Project title -->
  <text x="400" y="300" text-anchor="middle" font-family="'Syne', 'Inter', system-ui, sans-serif" font-size="24" font-weight="700" fill="#ece8e1" letter-spacing="-0.02em">Algo Visualizer</text>

  <!-- Tech stack -->
  <text x="400" y="330" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#7a7a8e" fill-opacity="0.7" letter-spacing="0.04em">TypeScript · React · Canvas API · Tailwind CSS</text>

  <!-- Decorative dots -->
  <circle cx="352" cy="360" r="2.5" fill="#8b5cf6" opacity="0.45"/>
  <circle cx="368" cy="360" r="2.5" fill="#8b5cf6" opacity="0.28"/>
  <circle cx="384" cy="360" r="2.5" fill="#8b5cf6" opacity="0.14"/>

  <!-- Bottom accent line -->
  <line x1="320" y1="380" x2="480" y2="380" stroke="#8b5cf6" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Corner accents -->
  <line x1="24" y1="24" x2="48" y2="24" stroke="#1e1f2e" stroke-opacity="0.5"/>
  <line x1="24" y1="24" x2="24" y2="48" stroke="#1e1f2e" stroke-opacity="0.5"/>
  <line x1="776" y1="426" x2="752" y2="426" stroke="#1e1f2e" stroke-opacity="0.5"/>
  <line x1="776" y1="426" x2="776" y2="402" stroke="#1e1f2e" stroke-opacity="0.5"/>
</svg>
