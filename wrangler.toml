name = "angelito91"
main = "./dist/_worker.js/index.js"

compatibility_date = "2025-06-15"
compatibility_flags = ["nodejs_compat"]

workers_dev = false
preview_urls = false

[assets]
binding = "ASSETS"
directory = "./dist"
not_found_handling = "404-page"

[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 0.1
invocation_logs = true
